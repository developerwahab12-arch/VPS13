name: VPS

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install SSHX
        run: curl -sSf https://sshx.io/get | sh

      - name: Start SSHX Session
        run: sshx
